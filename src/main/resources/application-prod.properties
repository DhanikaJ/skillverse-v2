spring.application.name=skillverse-v2

# Database Configuration - Railway provides DATABASE_URL automatically
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration - Production optimized
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Cloudinary Configuration - Production environment variables required
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api_key=${CLOUDINARY_API_KEY}
cloudinary.api_secret=${CLOUDINARY_API_SECRET}

# JWT Configuration - Production environment variable required
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger/OpenAPI Configuration - Disabled for production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Logging - Minimal for production
logging.level.root=WARN
logging.level.com.skillverse=INFO
logging.level.org.springframework.web=WARN

# Server Configuration - Production optimized
server.port=${PORT:8080}
server.servlet.context-path=/

# CORS Configuration - Production
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://myfutureskills.vercel.app}


