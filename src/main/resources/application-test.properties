spring.application.name=skillverse-v2

# H2 In-Memory Database for Testing
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=never
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.generate_statistics=false
spring.h2.console.enabled=true

# Cloudinary Configuration - Use environment variables or dummy test values
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:test-cloud}
cloudinary.api_key=${CLOUDINARY_API_KEY:test-key}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:test-secret}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger/OpenAPI Configuration
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.openapi.version=3.0.1

# Logging for debugging
logging.level.org.springdoc=DEBUG
logging.level.springdoc.openapi=DEBUG


