spring.application.name=skillverse-v2

# Database Configuration - Local PostgreSQL for development
spring.datasource.url=jdbc:postgresql://localhost:5332/skillverse-v2
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create
spring.sql.init.mode=never
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.generate_statistics=true

# Cloudinary Configuration - Use environment variables or defaults for development
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:dev-cloud}
cloudinary.api_key=${CLOUDINARY_API_KEY:dev-key}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:dev-secret}

# JWT Configuration - Local testing defaults
jwt.secret=${JWT_SECRET:dev_secret_key_for_local_development_only}
jwt.expiration=${JWT_EXPIRATION:86400000}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Swagger/OpenAPI Configuration - Enabled for development
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.openapi.version=3.0.1

# Logging for debugging
logging.level.org.springdoc=DEBUG
logging.level.springdoc.openapi=DEBUG
logging.level.com.skillverse=DEBUG

# CORS Configuration - Development
cors.allowed-origins=http://localhost:5173,https://localhost:5173,http://localhost:3000


